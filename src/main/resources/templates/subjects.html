<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Предметы — School System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar navbar-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">🏫 School System</a>
        <div class="d-flex align-items-center gap-2">
            <a th:href="@{/students}" th:if="${isAdmin or isTeacher}" class="btn btn-outline-light btn-sm">👨‍🎓 Студенты</a>
            <a th:href="@{/teachers}" th:if="${isAdmin or isTeacher}" class="btn btn-outline-light btn-sm">👩‍🏫 Учителя</a>
            <a th:href="@{/subjects}" class="btn btn-light btn-sm">📚 Предметы</a>
            <a th:href="@{/ratings}" class="btn btn-outline-light btn-sm">⭐ Оценки</a>
            <a th:href="@{/homework}" class="btn btn-outline-light btn-sm">📝 ДЗ</a>
            <a th:href="@{/}" class="btn btn-outline-light btn-sm">🏠 Главная</a>
            <a th:href="@{/profile}" class="btn btn-outline-light btn-sm">👤 Профиль</a>
        </div>
    </div>
</nav>

<div class="container py-4">

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h3 class="fw-bold mb-0">📚 Предметы</h3>
            <p class="text-muted small mb-0">Список школьных предметов</p>
        </div>

        <button th:if="${isAdmin}"
                class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addSubjectModal">
            ➕ Добавить предмет
        </button>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="bg-light">
                        <tr>
                            <th class="ps-3" style="width: 50px;">#</th>
                            <th>Название</th>
                            <th>Описание</th>
                            <th class="text-end pe-3" th:if="${isAdmin}">Действия</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="subject, iter : ${subjects}">
                            <td class="ps-3 fw-bold text-muted" th:text="${iter.count}">1</td>
                            <td class="fw-semibold">
                                <span th:text="${subject.name}">Математика</span>
                            </td>
                            <td class="text-muted small">
                                <span th:text="${subject.description}">Базовый курс</span>
                            </td>
                            <td class="text-end pe-3" th:if="${isAdmin}">
                                <button class="btn btn-light btn-sm text-primary"
                                        data-bs-toggle="modal"
                                        th:data-bs-target="'#editSubjectModal' + ${subject.id}">
                                    ✏️
                                </button>
                                <a th:href="@{'/subjects/delete/' + ${subject.id}}"
                                   class="btn btn-light btn-sm text-danger"
                                   onclick="return confirm('Удалить этот предмет?');">
                                    🗑
                                </a>

                                <div class="modal fade" th:id="'editSubjectModal' + ${subject.id}" tabindex="-1">
                                    <div class="modal-dialog">
                                        <div class="modal-content">
                                            <form th:action="@{'/subjects/edit/' + ${subject.id}}" method="post">
                                                <div class="modal-header">
                                                    <h5 class="modal-title">Редактировать предмет</h5>
                                                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                                </div>
                                                <div class="modal-body text-start">
                                                    <div class="mb-3">
                                                        <label class="form-label">Название</label>
                                                        <input type="text" name="name" class="form-control"
                                                               th:value="${subject.name}" required>
                                                    </div>
                                                    <div class="mb-3">
                                                        <label class="form-label">Описание</label>
                                                        <textarea name="description" class="form-control" rows="2"
                                                                  th:text="${subject.description}"></textarea>
                                                    </div>
                                                </div>
                                                <div class="modal-footer">
                                                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                                                    <button type="submit" class="btn btn-primary">Сохранить</button>
                                                </div>
                                            </form>
                                        </div>
                                    </div>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(subjects)}">
                            <td colspan="4" class="text-center py-4 text-muted">
                                Список предметов пуст
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="addSubjectModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <form th:action="@{/subjects/add}" method="post">
                <div class="modal-header">
                    <h5 class="modal-title">Добавить новый предмет</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Название <span class="text-danger">*</span></label>
                        <input type="text" name="name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Описание</label>
                        <textarea name="description" class="form-control" rows="2"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                    <button type="submit" class="btn btn-primary">Добавить</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

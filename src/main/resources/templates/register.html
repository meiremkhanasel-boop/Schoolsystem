<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Регистрация - School System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #1cc88a 0%, #13855c 100%); height: 100vh; display: flex; align-items: center; }
        .register-card { border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); background: white; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card register-card p-4">
                <div class="text-center mb-4">
                    <h2 class="text-success">Создать аккаунт</h2>
                    <p class="text-muted">Присоединяйтесь к нашей школьной системе</p>
                </div>
                <form th:action="@{/register}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Полное имя</label>
                        <input type="text" name="fullname" class="form-control" placeholder="Иван Иванов" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Логин</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Пароль</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100 py-2 mb-3">Зарегистрироваться</button>
                    <div class="text-center">
                        <a th:href="@{/login}" class="text-decoration-none">Уже есть аккаунт? Войти</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>

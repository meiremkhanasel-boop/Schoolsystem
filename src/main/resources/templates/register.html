<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Регистрация — School System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background: linear-gradient(135deg, #1cc88a 0%, #13855c 100%); }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="auth-card">
                <div class="auth-header" style="background: linear-gradient(135deg, #1cc88a, #13855c)">
                    <div style="font-size:3rem">📝</div>
                    <h3 class="fw-bold mt-2 mb-1">Создать аккаунт</h3>
                    <p class="mb-0 opacity-75 small">Тіркелу / Регистрация</p>
                </div>
                <div class="p-4">
                    <div th:if="${error}" class="alert alert-danger py-2 small" th:text="${error}"></div>

                    <form th:action="@{/register}" method="post" id="regForm">
                        <div class="mb-3">
                            <label class="form-label fw-semibold small text-muted">ПОЛНОЕ ИМЯ
                                <span class="text-muted">(необязательно)</span></label>
                            <div class="input-group">
                                <span class="input-group-text bg-light">✏️</span>
                                <input type="text" name="fullname" class="form-control"
                                       placeholder="Иван Иванов">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold small text-muted">EMAIL
                                <span class="text-muted">(необязательно для уведомлений)</span></label>
                            <div class="input-group">
                                <span class="input-group-text bg-light">✉️</span>
                                <input type="email" name="email" class="form-control"
                                       placeholder="your.email@example.com">
                            </div>
                            <div class="form-text small">На этот адрес будут отправлены уведомления</div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold small text-muted">ЛОГИН <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text bg-light">👤</span>
                                <input type="text" name="username" id="usernameInput"
                                       class="form-control" placeholder="Минимум 3 символа"
                                       required minlength="3" oninput="checkUsername(this)">
                            </div>
                            <div id="usernameHint" class="form-text small"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold small text-muted">ПАРОЛЬ <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text bg-light">🔒</span>
                                <input type="password" name="password" id="passReg"
                                       class="form-control" placeholder="Минимум 4 символа"
                                       required minlength="4" oninput="checkPass(this)">
                                <button type="button" class="btn btn-light border"
                                        onclick="togglePassReg()">👁</button>
                            </div>
                            <div class="progress mt-2" style="height:4px;border-radius:4px">
                                <div id="passStrength" class="progress-bar" style="width:0%"></div>
                            </div>
                            <div id="passHint" class="form-text small"></div>
                        </div>
                        <button type="submit" class="btn btn-success w-100 py-2 mb-3">
                            ✅ Зарегистрироваться
                        </button>
                    </form>

                    <div class="text-center">
                        <a th:href="@{/login}" class="text-decoration-none text-success small">
                            🔑 Уже есть аккаунт? Войти
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
function togglePassReg() {
    const p = document.getElementById('passReg');
    p.type = p.type === 'password' ? 'text' : 'password';
}
function checkUsername(el) {
    const hint = document.getElementById('usernameHint');
    if (el.value.length < 3) {
        hint.innerHTML = '<span class="text-danger">⚠ Минимум 3 символа</span>';
    } else {
        hint.innerHTML = '<span class="text-success">✓ Логин подходит</span>';
    }
}
function checkPass(el) {
    const bar = document.getElementById('passStrength');
    const hint = document.getElementById('passHint');
    const len = el.value.length;
    let strength = 0, color = '', label = '';
    if (len >= 4) strength = 25;
    if (len >= 6) strength = 50;
    if (len >= 8 && /[A-Z]/.test(el.value)) strength = 75;
    if (len >= 10 && /[0-9]/.test(el.value) && /[A-Z]/.test(el.value)) strength = 100;
    if (strength <= 25)  { color = 'bg-danger';  label = '😟 Слабый'; }
    else if (strength <= 50)  { color = 'bg-warning'; label = '😐 Средний'; }
    else if (strength <= 75)  { color = 'bg-info';    label = '🙂 Хороший'; }
    else                      { color = 'bg-success'; label = '💪 Надёжный'; }
    bar.style.width = strength + '%';
    bar.className = 'progress-bar ' + color;
    hint.innerHTML = strength > 0 ? '<span>Пароль: ' + label + '</span>' : '';
}
</script>
</body>
</html>

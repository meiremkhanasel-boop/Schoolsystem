<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>School Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="text-center mb-5">
        <h1 class="display-4 fw-bold text-primary">School System Portal</h1>
        <p class="lead text-muted">Добро пожаловать в систему управления учебным процессом</p>
    </div>

    <div class="row g-4 justify-content-center">
        <div class="col-md-5">
            <div class="card h-100 shadow-lg border-0 card-hover">
                <div class="card-body text-center p-5">
                    <div class="display-1 mb-3">👨‍🎓</div>
                    <h2 class="fw-bold">Студенты</h2>
                    <p class="text-muted">Просмотр, добавление и удаление учеников</p>
                    <a th:href="@{/students}" class="btn btn-primary btn-lg px-5 mt-3">Перейти</a>
                </div>
            </div>
        </div>

        <div class="col-md-5">
            <div class="card h-100 shadow-lg border-0 card-hover">
                <div class="card-body text-center p-5">
                    <div class="display-1 mb-3">👩‍🏫</div>
                    <h2 class="fw-bold">Учителя</h2>
                    <p class="text-muted">Управление преподавательским составом</p>
                    <a th:href="@{/teachers}" class="btn btn-success btn-lg px-5 mt-3">Перейти</a>
                </div>
            </div>
        </div>
    </div>

    <div class="text-center mt-5">
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn-link text-danger">Выйти из системы</button>
        </form>
    </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Редактировать пользователя — School System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar navbar-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">🏫 School System</a>
        <div class="d-flex align-items-center gap-2">
            <a th:href="@{/admin}" class="btn btn-danger btn-sm">👑 Админ</a>
            <form th:action="@{/logout}" method="post" class="m-0">
                <button type="submit" class="btn btn-outline-light btn-sm">Выйти</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow">
                <div class="card-header bg-warning text-dark fw-bold">
                    ✏️ Редактировать пользователя
                </div>
                <div class="card-body">
                    <form th:action="@{/admin/edit/{id}(id=${user.id})}" th:object="${user}" method="post">

                        <input type="hidden" th:field="*{id}">

                        <div class="mb-3">
                            <label class="form-label fw-bold">👤 Имя пользователя</label>
                            <input type="text" class="form-control" th:field="*{username}"
                                   placeholder="Введите имя пользователя" required>
                            <small class="text-muted">Минимум 3 символа</small>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">📧 Email</label>
                            <input type="email" class="form-control" th:field="*{email}"
                                   placeholder="example@mail.com">
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">🔐 Пароль</label>
                            <input type="password" class="form-control" th:field="*{password}"
                                   placeholder="Оставьте пусто чтобы не менять пароль">
                            <small class="text-muted">Оставьте пусто, чтобы сохранить текущий пароль</small>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">🔑 Роль</label>
                            <select class="form-select" th:field="*{role}" required>
                                <option value="">-- Выберите роль --</option>
                                <option value="ROLE_ADMIN">👑 Администратор</option>
                                <option value="ROLE_TEACHER">👩‍🏫 Учитель</option>
                                <option value="ROLE_STUDENT">👨‍🎓 Студент</option>
                            </select>
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a th:href="@{/admin/users}" class="btn btn-secondary">← Отмена</a>
                            <button type="submit" class="btn btn-warning">💾 Обновить</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

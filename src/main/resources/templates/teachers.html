<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Управление учителями</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">🏠 Главная</a>
        <span class="navbar-text text-white fw-bold">Система Учителей</span>
    </div>
</nav>

<div class="container">
    <div class="card p-4 mb-5 shadow-sm border-0">
        <h4 class="mb-3 text-primary">Добавить нового преподавателя</h4>
        <form th:action="@{/teachers/add}" method="post" class="row g-3">
            <div class="col-md-2">
                <input type="number" name="id" class="form-control" placeholder="ID" required>
            </div>
            <div class="col-md-4">
                <input type="text" name="name" class="form-control" placeholder="ФИО учителя" required>
            </div>
            <div class="col-md-4">
                <input type="text" name="subject" class="form-control" placeholder="Предмет (напр. Физика)" required>
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-success w-100">Сохранить</button>
            </div>
        </form>
    </div>

    <h2 class="mb-4">Список преподавателей</h2>
    <div class="row">
        <div class="col-md-4" th:each="teacher : ${teachers}">
            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <h5 class="card-title text-primary" th:text="${teacher.name}">ФИО</h5>
                    <p class="card-text"><strong>Предмет:</strong> <span th:text="${teacher.subject}">Предмет</span></p>
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="badge bg-secondary" th:text="'ID: ' + ${teacher.id}"></span>
                        <a th:href="@{/teachers/delete/{id}(id=${teacher.id})}"
                           class="btn btn-outline-danger btn-sm">Удалить</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вход - School System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #4e73df 0%, #224abe 100%); height: 100vh; display: flex; align-items: center; }
        .login-card { border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card login-card p-4">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-primary">School System</h2>
                    <p class="text-muted">Войдите в аккаунт</p>
                </div>
                <div th:if="${param.error}" class="alert alert-danger py-2">Неверный логин или пароль</div>
                <div th:if="${param.logout}" class="alert alert-success py-2">Вы вышли из системы</div>
                <form th:action="@{/login}" method="post">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Логин</label>
                        <input type="text" name="username" class="form-control" placeholder="admin" required autofocus>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Пароль</label>
                        <input type="password" name="password" class="form-control" placeholder="Введите пароль" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 mb-3">Войти</button>
                    <div class="text-center">
                        <a th:href="@{/register}" class="text-decoration-none text-muted">Нет аккаунта? Зарегистрироваться</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>

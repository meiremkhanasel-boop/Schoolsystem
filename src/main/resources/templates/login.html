<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Вход — School System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="auth-card">
                <div class="auth-header">
                    <div style="font-size:3rem">🏫</div>
                    <h3 class="fw-bold mt-2 mb-1">School System</h3>
                    <p class="mb-0 opacity-75 small">Жүйеге кіріңіз / Войдите в систему</p>
                </div>
                <div class="p-4">
                    <div th:if="${param.error}" class="alert alert-danger py-2 small">
                        ❌ Неверный логин или пароль
                    </div>
                    <div th:if="${param.logout}" class="alert alert-info py-2 small">
                        👋 Вы успешно вышли из системы
                    </div>
                    <div th:if="${param.registered}" class="alert alert-success py-2 small">
                        ✅ Регистрация прошла успешно! Войдите.
                    </div>
                    <div th:if="${registeredMessage}" class="alert alert-success py-2 small" th:text="${registeredMessage}">
                    </div>
                    <div th:if="${registrationWarning}" class="alert alert-warning py-2 small" th:text="${registrationWarning}">
                    </div>
                    <div th:if="${param.expired}" class="alert alert-warning py-2 small">
                        ⏰ Сессия истекла. Войдите снова.
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-semibold small text-muted">ЛОГИН</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0">👤</span>
                                <input type="text" name="username" class="form-control border-start-0"
                                       placeholder="admin" required autofocus
                                       style="border-radius:0 10px 10px 0">
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold small text-muted">ПАРОЛЬ</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0">🔒</span>
                                <input type="password" name="password" id="passInput"
                                       class="form-control border-start-0"
                                       placeholder="••••••••" required
                                       style="border-radius:0 10px 10px 0">
                                <button type="button" class="btn btn-light border"
                                        onclick="togglePass()" style="border-radius:0 10px 10px 0">👁</button>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 mb-3">
                            🚀 Войти
                        </button>
                    </form>

                    <div class="text-center">
                        <a th:href="@{/register}" class="text-decoration-none text-primary small">
                            📝 Нет аккаунта? Зарегистрироваться
                        </a>
                    </div>
                    <hr class="my-3">
                    <div class="bg-light rounded p-2 text-center small text-muted">

                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
function togglePass() {
    const p = document.getElementById('passInput');
    p.type = p.type === 'password' ? 'text' : 'password';
}
</script>
</body>
</html>
